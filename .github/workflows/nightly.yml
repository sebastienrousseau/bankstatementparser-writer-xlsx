name: Nightly Quality

on:
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly:
    name: Nightly check + coverage upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install this package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov interrogate ruff black mypy bandit pip-audit

      - name: Full gate (lint + type + tests + interrogate + bandit + audit)
        run: |
          ruff check bankstatementparser_writer_xlsx/ tests/
          black --check bankstatementparser_writer_xlsx/ tests/
          mypy bankstatementparser_writer_xlsx/
          pytest tests/ --cov=bankstatementparser_writer_xlsx --cov-branch --cov-report=xml --cov-fail-under=100
          interrogate -c pyproject.toml bankstatementparser_writer_xlsx
          bandit -r bankstatementparser_writer_xlsx/ -ll
          pip-audit
