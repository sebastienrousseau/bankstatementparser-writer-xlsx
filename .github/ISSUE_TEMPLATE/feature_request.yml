name: Feature Request
description: Suggest a new output option or input shape for bankstatementparser-writer-xlsx
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        What can't you do today with bankstatementparser-writer-xlsx? If
        this relates to data the bankstatementparser core produces, link
        to it.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: |
        Sketch the new behaviour. New argument, output formatting, sheet,
        or supported input shape. Include the expected workbook result.
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Real-World Use Case
      description: How would you actually use this in your reporting flow?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - New write_xlsx argument
        - Output formatting
        - New input shape
        - New sheet
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: textarea
    id: contribution
    attributes:
      label: Willingness To Contribute
      description: Could you take a stab at the implementation or tests?
