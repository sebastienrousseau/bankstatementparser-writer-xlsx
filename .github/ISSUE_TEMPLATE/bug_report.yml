name: Bug Report
description: Report a reproducible problem in bankstatementparser-writer-xlsx
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: input
    id: version
    attributes:
      label: bankstatementparser-writer-xlsx Version
      placeholder: "0.0.1"
    validations:
      required: true
  - type: input
    id: bankstatementparser_version
    attributes:
      label: bankstatementparser Version
      placeholder: "0.0.9"
    validations:
      required: true
  - type: dropdown
    id: python_version
    attributes:
      label: Python Version
      options:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
    validations:
      required: true
  - type: dropdown
    id: input_shape
    attributes:
      label: Input Shape
      options:
        - pandas DataFrame
        - list[Transaction]
        - list[dict]
        - Other
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: call
    attributes:
      label: Call
      description: |
        The write_xlsx() call and a minimal sample of the input data
        (redact any sensitive IBAN/BIC values - placeholder data is fine).
      render: python
    validations:
      required: true
  - type: textarea
    id: error_output
    attributes:
      label: Error Output
      description: The full traceback returned.
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything Else
      description: Logs, environment details, etc.
